{% extends 'base.html' %}

{% block content %}

<div class="chat-container">

    <div class="chat-messages">

        {% for mensagem in mensagens %}

            <div class="message {{ mensagem.tipo }}">
                {{ mensagem.texto }}
            </div>

        {% endfor %}

    </div>

    <form method="POST" class="chat-input">

        <input type="text"
               name="mensagem"
               placeholder="Digite uma mensagem..."
               required>

        <button type="submit">
            Enviar
        </button>

    </form>

</div>

{% endblock %}
