{% extends 'base.html' %}

{% block content %}

<main class="chat-layout">

    <aside class="client-sidebar">

        <div class="client-sidebar-title">
            Clientes
        </div>

        {% for cliente in clientes %}
            <a class="client-link {% if cliente.id == cliente_selecionado.id %}active{% endif %}"
               href="{{ url_for('venda.simulacao_venda', cliente_id=cliente.id) }}">
                <span>{{ cliente.nome }}</span>
                <small>{{ cliente.telefone }}</small>
            </a>
        {% endfor %}

    </aside>

    <section class="chat-container">

        <div class="chat-client-header">
            Conversa com {{ cliente_selecionado.nome }}
        </div>

        <div class="chat-messages" id="chat-messages">

            {% for mensagem in mensagens %}

                <div class="message {{ mensagem.tipo }}">
                    {{ mensagem.texto }}
                </div>

            {% endfor %}

        </div>

        <form method="POST" class="chat-input">

            <input type="hidden"
                   name="cliente_id"
                   value="{{ cliente_selecionado.id }}">

            <input type="text"
                   name="mensagem"
                   placeholder="Digite sua mensagem..."
                   required>

            <button type="submit">
                Enviar
            </button>

        </form>

    </section>

</main>

<script>
    const chatMessages = document.getElementById("chat-messages");

    if (chatMessages) {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
</script>

{% endblock %}
